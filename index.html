<!DOCTYPE html>
<html>
<head>
  <title>Pakistan Tax Calculator 2025-26</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAV -->
  <div class="nav">
    <div class="logo">TaxEase</div>
    <div class="tag">Pakistan • 2025–26</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Income Tax Calculator</h1>
    <p>Fast & simple tax estimation for Pakistan</p>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <label>Enter Monthly Income</label>
    <input id="income" placeholder="e.g. 100000" />

    <button onclick="calculateTax()">Calculate Tax</button>

    <div id="result" class="result"></div>

    <!-- WHATSAPP BUTTON (IMPORTANT) -->
    <button class="share-btn" onclick="shareWhatsApp()">
      Share on WhatsApp
    </button>

    <div class="note">
      Estimated calculation based on Pakistan tax slabs (2025–26)
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
