<!DOCTYPE html>
<html>
<head>
  <title>Pakistan Tax Calculator 2025-26</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TOP NAV -->
  <div class="nav">
    <div class="logo">TaxEase</div>
    <div class="tag">Pakistan • 2025–26</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Instant Income Tax Calculator</h1>
    <p>Fast, simple & accurate tax estimation for salaried individuals in Pakistan</p>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <label>Enter Monthly Income</label>
    <input id="income" placeholder="e.g. 100000" />

    <button onclick="calculateTax()">Calculate Tax</button>

    <div id="result"></div>

    <div class="note">
      Estimated calculation based on FBR tax slabs (2025–26)
    </div>

  </div>

</body>

<script src="script.js"></script>
</html>
