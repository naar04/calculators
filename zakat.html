<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zakat Calculator Pakistan 2026 | Tola + Live Gold Price + PDF</title>

<meta name="description" content="Advanced Zakat Calculator Pakistan with Tola system, live gold/silver prices, Urdu support, and formatted PDF download.">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:20px;
}

.container {
  max-width:520px;
  margin:auto;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
  padding:20px;
  border-radius:15px;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  outline:none;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  background:#00c6ff;
}

/* RESULT */
.result {
  margin-top:10px;
  padding:12px;
  background:rgba(0,0,0,0.3);
  border-radius:10px;
  font-size:14px;
}

/* SMALL TEXT */
.small {
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<header>
<h1 id="title">Zakat Calculator Pakistan</h1>
<button onclick="toggleLang()">اردو</button>
<p class="small" id="priceBox">Loading live prices...</p>
</header>

<div class="container">

<input type="number" id="cash" placeholder="Cash (PKR)">
<input type="number" id="gold" placeholder="Gold (Tola - تولہ)">
<input type="number" id="silver" placeholder="Silver (Tola - تولہ)">
<input type="number" id="business" placeholder="Business / Investments">
<input type="number" id="liabilities" placeholder="Liabilities (Loans)">

<button onclick="calculate()">Calculate Zakat</button>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="shareResult()">Share Result</button>

<div class="result" id="result"></div>

</div>

<script>
// ---------------- LIVE PRICES ----------------
let goldPrice = 22000;
let silverPrice = 250;

// fallback API (safe)
fetch("https://api.metals.live/v1/spot")
.then(r=>r.json())
.then(data=>{
  data.forEach(i=>{
    if(i.gold) goldPrice = (i.gold * 2800) / 31.1;
    if(i.silver) silverPrice = (i.silver * 2800) / 31.1;
  });

  document.getElementById("priceBox").innerText =
    `Gold: PKR ${goldPrice.toFixed(0)} / gram | Silver: PKR ${silverPrice.toFixed(0)} / gram`;
})
.catch(()=>{
  document.getElementById("priceBox").innerText =
    "Using estimated market prices";
});

// ---------------- CALCULATION ----------------
let lastResult = "";

function calculate() {

  let cash = +document.getElementById('cash').value || 0;

  let goldTola = +document.getElementById('gold').value || 0;
  let silverTola = +document.getElementById('silver').value || 0;

  // Tola → grams
  let gold = goldTola * 11.66 * goldPrice;
  let silver = silverTola * 11.66 * silverPrice;

  let business = +document.getElementById('business').value || 0;
  let liabilities = +document.getElementById('liabilities').value || 0;

  let total = cash + gold + silver + business;
  let net = total - liabilities;

  // Nisab (52.5 tola silver)
  let nisab = 52.5 * 11.66 * silverPrice;

  let zakat = net >= nisab ? net * 0.025 : 0;

  lastResult =
`ZAKAT REPORT
---------------------
Net Wealth: PKR ${net.toFixed(0)}
Nisab Threshold: PKR ${nisab.toFixed(0)}
Zakat Payable: PKR ${zakat.toFixed(0)}

Generated by Pakistan Zakat Calculator`;

  document.getElementById("result").innerHTML = `
    <b>Net Wealth:</b> PKR ${net.toFixed(0)} <br>
    <b>Nisab:</b> PKR ${nisab.toFixed(0)} <br>
    <b>Zakat:</b> PKR ${zakat.toFixed(0)}
  `;
}

// ---------------- PDF (FORMATTED) ----------------
function downloadPDF() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFont("helvetica","bold");
  doc.setFontSize(16);
  doc.text("Zakat Calculation Report", 20, 20);

  doc.setFontSize(11);
  doc.setFont("helvetica","normal");

  let lines = lastResult.split("\n");
  let y = 40;

  lines.forEach(line=>{
    doc.text(line, 20, y);
    y += 8;
  });

  doc.save("zakat-report.pdf");
}

// ---------------- SHARE ----------------
function shareResult(){
  if(navigator.share){
    navigator.share({
      title:"Zakat Calculator Result",
      text:lastResult
    });
  } else {
    navigator.clipboard.writeText(lastResult);
    alert("Copied to clipboard");
  }
}

// ---------------- URDU TOGGLE ----------------
let urdu = false;
function toggleLang(){
  urdu = !urdu;

  document.getElementById("title").innerText =
    urdu ? "زکات کیلکولیٹر" : "Zakat Calculator Pakistan";
}
</script>

</body>
</html>
