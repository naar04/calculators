<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zakat Calculator Pakistan 2026 | Tola Based Accurate Calculator</title>

<meta name="description" content="Accurate Zakat Calculator Pakistan using tola system. Calculate gold, silver, cash, business assets and check nisab instantly. Mobile-friendly and SEO optimized.">

<meta name="keywords" content="zakat calculator pakistan, zakat calculator tola, gold zakat calculator, silver nisab pakistan, islamic calculator online">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

header{
  text-align:center;
  padding:22px 16px;
}

header h1{
  font-size:24px;
  margin:0;
}

header p{
  margin-top:6px;
  opacity:0.8;
  font-size:13px;
}

.wrap{
  max-width:520px;
  margin:auto;
  padding:16px;
}

.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:16px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  outline:none;
  font-size:14px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
  background:#00c6ff;
  color:#000;
}

button:active{transform:scale(0.98)}

.result{
  margin-top:12px;
  padding:12px;
  background:rgba(0,0,0,0.35);
  border-radius:10px;
  font-size:14px;
  line-height:1.5;
}

.badge{
  display:inline-block;
  margin-top:8px;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
}

.ok{background:#1db954;}
.no{background:#ff4d4d;}

.small{
  font-size:12px;
  opacity:0.8;
  margin-top:6px;
}

section{
  max-width:800px;
  margin:30px auto;
  padding:16px;
  line-height:1.6;
}

h2{font-size:18px}

footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<header>
<h1>Zakat Calculator Pakistan</h1>
<p>Stable Tola-Based Financial Engine (2026)</p>
</header>

<div class="wrap">
  <div class="card">

    <div class="small" id="rateInfo">Loading rates...</div>

    <input type="number" id="cash" placeholder="Cash (PKR)">
    <input type="number" id="gold" placeholder="Gold (Tola)">
    <input type="number" id="silver" placeholder="Silver (Tola)">
    <input type="number" id="business" placeholder="Business / Investments (PKR)">
    <input type="number" id="liabilities" placeholder="Liabilities (PKR)">

    <button onclick="calc()">Calculate Zakat</button>

    <div class="result" id="result"></div>

  </div>
</div>

<section>
<h2>What is Zakat?</h2>
<p>Zakat is 2.5% obligatory charity on wealth above Nisab threshold in Islam.</p>

<h2>Nisab Rule</h2>
<p>Gold: 7.5 Tola | Silver: 52.5 Tola (Silver standard used for fairness)</p>
</section>

<footer>
© 2026 Pakistan Zakat Calculator
</footer>

<script>

// stable base prices (no API dependency for correctness)
let goldPerGram = 412815;
let silverPerGram = 6800;

const TOLA = 11.66;

let goldPerTola = goldPerGram * TOLA;
let silverPerTola = silverPerGram * TOLA;

// UI rate info
document.getElementById("rateInfo").innerText =
`Gold: PKR ${Math.round(goldPerTola)}/tola | Silver: PKR ${Math.round(silverPerTola)}/tola`;

function calc(){

  let cash = +document.getElementById('cash').value || 0;
  let goldTola = +document.getElementById('gold').value || 0;
  let silverTola = +document.getElementById('silver').value || 0;
  let business = +document.getElementById('business').value || 0;
  let liabilities = +document.getElementById('liabilities').value || 0;

  let goldValue = goldTola * goldPerTola;
  let silverValue = silverTola * silverPerTola;

  let net = cash + goldValue + silverValue + business - liabilities;

  let nisab = 52.5 * silverPerTola;

  let zakat = (net >= nisab) ? net * 0.025 : 0;

  document.getElementById("result").innerHTML =
  `
  <b>Net Wealth:</b> PKR ${Math.round(net)}<br>
  <b>Nisab:</b> PKR ${Math.round(nisab)}<br>
  <b>Zakat:</b> PKR ${Math.round(zakat)}<br>
  <span class="badge ${net>=nisab?'ok':'no'}">
  ${net>=nisab?'Zakat Applicable':'Not Applicable'}
  </span>
  `;
}

</script>

</body>
</html>
